<div class="lg_bd" id="lg_bd">
    <div class="lg_banner_wrap">
        <div class="lg_banner">
            <div class="lg_ad_wrapper" style="transform: translate3d(-261px, 0px, 0px);">
                <div class="lg_ad_pic_wrapper"><img
                        src="https://bd-s.tripcdn.cn/NFES/H5login/1765434931677/_next/serverStatic/images/pc_login_bg.png"
                        alt="ad_banner"></div>
            </div>
        </div>
    </div>
    <div id="bbz_accounts_pc_lg_box">
        <div class="mod-box">
            <div class="lg_loginwrap ">
                <div data-testid="loginBox" class="lg_loginbox lg_ercode"
                    style="outline: none; top: 10px; margin-top: 40px;">
                    <h2 class="lg_loginbox_title">账号密码登录<a href="javascript:void(0)" data-testid="commonEntry"
                            class="login_phone_number getOrder">手机号查单<i>&gt;</i></a></h2>
                    <div data-testid="accountPanel" class="form_wrap" style="display: block;">
                        <form>
                            <dl>
                                <dd><input data-testid="accountNameInput" type="text" placeholder="国内手机号/用户名/邮箱/卡号"
                                        class="r_input bbz-js-iconable-input"></dd>
                            </dl>
                            <dl>
                                <dd class="r_input input_auth-code"><input data-testid="passwordInput" type="password"
                                        autocomplete="new-password" placeholder="登录密码" class="bbz-js-iconable-input"><a
                                        href="javascript:void(0)" data-testid="commonEntry" class="forgotpwd">忘记密码</a>
                                </dd>
                            </dl>
                            <dl>
                                <dd><input data-testid="loginButton" type="button" class="form_btn form_btn--block"
                                        value="登   录"></dd>
                            </dl>
                        </form>
                    </div>
                    <div data-testid="dynamicPanel" class="form_wrap" style="display: none;">
                        <form>
                            <dl>
                                <dd>
                                    <div data-testid="countryCodeInput" class="r_input input_country-code ">
                                        <div id="country_select" class="country_code_select "><span id="country">中国大陆
                                                86</span></div><a href="javascript:;"><i class="link_code"></i></a>
                                    </div>
                                </dd>
                            </dl>
                            <dl>
                                <dd>
                                    <dl>
                                        <dd><input data-testid="telInput" type="tel" placeholder="请输入手机号"
                                                class=" r_input bbz-js-iconable-input"></dd>
                                    </dl>
                                </dd>
                            </dl>
                            <dl data-testid="dynamicCodeInput">
                                <dd class="r_input input_auth-code dynamic"><input data-testid="verifyCodeInput"
                                        type="text" placeholder="请输入验证码" maxlength="6" class="bbz-js-iconable-input"><a
                                        class="btn-primary-s " style="cursor: pointer;">发送验证码</a></dd>
                            </dl>
                            <dl>
                                <dd><input data-testid="loginButton" type="button" class="form_btn form_btn--block"
                                        value="登录"></dd>
                            </dl>
                        </form>
                    </div>
                    <div data-testid="overseaPanel" class="form_wrap" style="display: none;">
                        <form>
                            <dl>
                                <dd>
                                    <div data-testid="countryCodeInput" class="r_input input_country-code ">
                                        <div id="country_select" class="country_code_select "><span id="country">中国大陆
                                                86</span></div><a href="javascript:;"><i class="link_code"></i></a>
                                    </div>
                                </dd>
                            </dl>
                            <dl>
                                <dd>
                                    <dl>
                                        <dd><input data-testid="telInput" type="tel" placeholder="请输入手机号"
                                                class=" r_input bbz-js-iconable-input"></dd>
                                    </dl>
                                </dd>
                            </dl>
                            <dl>
                                <dd class="r_input input_auth-code"><input data-testid="passwordInput" type="password"
                                        placeholder="登录密码" class="bbz-js-iconable-input"><a href="javascript:void(0)"
                                        data-testid="commonEntry" class="forgotpwd">忘记密码</a></dd>
                            </dl>
                            <dl>
                                <dd><input data-testid="loginButton" type="button" class="form_btn form_btn--block"
                                        value="登录"></dd>
                            </dl>
                        </form>
                    </div>
                    <div class="form_wrap">
                        <div data-testid="agreementList" class="agreement-list">
                            <div data-testid="checkboxAgreement" class="checkbox-agreement"
                                style="border-color: rgb(179, 179, 179); margin-right: 4px;"><input type="checkbox"
                                    id="checkboxAgreementInput" autocomplete="off" class="agreement-checkbox"><label
                                    for="checkboxAgreementInput"></label></div>
                            <div data-testid="agreementEntry" style="display: inline-block; vertical-align: middle;">
                                阅读并同意携程的<a href="javascript:void(0)" data-testid="commonEntry"
                                    class="serviceAgreement">服务协议</a>和<a href="javascript:void(0)"
                                    data-testid="commonEntry" class="privacyPolicy">个人信息保护政策</a></div>
                        </div>
                        <dl>
                            <dd>
                                <div class="login-set"><a href="javascript:void(0)" data-testid="commonEntry"
                                        class="login-entry-dynamic">验证码登录</a><a href="javascript:void(0)"
                                        data-testid="commonEntry" class="free-regist">免费注册</a></div>
                            </dd>
                        </dl>
                    </div>
                    <div class="login-code"><a href="javascript:void(0)" data-testid="commonEntry">扫码登录<i
                                class="icon-ercode"></i></a></div>
                    <div class="lg_weblogin">
                        <div class="login-about"><a href="javascript:void(0)" data-testid="commonEntry">境外手机</a><span
                                class="sep">|</span><a href="javascript:void(0)" data-testid="commonEntry"
                                class="companylogin">公司客户</a><span class="sep">|</span><a href="javascript:void(0)"
                                data-testid="commonEntry" class="fuli">携程通</a></div>
                        <div class="login-other"><a href="javascript:void(0)" data-testid="commonEntry"
                                class="icon-new-wechat">微信</a><a href="javascript:void(0)" data-testid="commonEntry"
                                class="icon-new-qq">QQ</a><a href="javascript:void(0)" data-testid="commonEntry"
                                class="icon-new-alipay">支付宝</a><a href="javascript:void(0)" data-testid="commonEntry"
                                class="icon-new-sina">新浪微博</a><a href="javascript:void(0)" data-testid="commonEntry"
                                class="icon-new-baidu">百度</a></div>
                    </div>
                </div>
                <div data-testid="captcha" id="captcha"></div>
            </div>
        </div>
    </div>
</div>
