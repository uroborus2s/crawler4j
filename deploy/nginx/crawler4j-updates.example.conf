# Replace server_name and certificate paths before enabling this site.
# If the domain is private-only and cannot use Let's Encrypt, swap the ssl_* files
# below to your internal CA or pre-provisioned certificate paths.

server {
    listen 80;
    listen [::]:80;
    server_name updates.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name updates.example.com;

    root /srv/nginx/updates;

    ssl_certificate /etc/letsencrypt/live/updates.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/updates.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;

    location = / {
        return 302 https://$host/crawler4j/appcast.xml;
    }

    location = /crawler4j/appcast.xml {
        default_type application/xml;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ^~ /crawler4j/ {
        types {
            application/xml xml;
            application/x-apple-diskimage dmg;
            application/octet-stream pkg;
            application/octet-stream zip;
        }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        try_files $uri =404;
    }
}
