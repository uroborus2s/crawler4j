id: "ctrip-hotel-detail-batch"
name: "携程酒店详情-并发批处理"

# 1. 资源选择: 使用 VirtualBrowser
selector:
  env_type: "virtual_browser"
  match_labels:
    region: "cn"
  sort_strategy: "best_fit"

# 2. 弹性伸缩: 
scaling:
  mode: "elastic"
  max_concurrency: 5
  min_idle: 0
  creation_timeout: 180
  
  # [New] 环境创建参数，透传给 VirtualBrowserProvider
  creation_params:
    name_prefix: "CtripWorker"
    groups: [] 
    # 代理配置 (SOCKS5 示例)
    proxy:
      mode: 2
      protocol: "SOCKS5"
      host: "192.168.1.100"
      port: "1080"
      user: "user"
      pass: "pass"
    # 指纹随机化开关 (Provider 内部实现)
    fingerprint:
      randomize_all: true

# 3. 执行策略:
execution:
  module: "crawler4j.modules.ctrip"
  workflow: "hotel_detail_parser"
  concurrency: 2 # 每次启动 2 个
  timeout: 600

# 4. 清理策略:
teardown:
  on_success: "destroy" # 用完即毁，确保 IP/指纹轮换
  on_failure: "destroy"
