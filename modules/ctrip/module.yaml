name: ctrip
display_name: 携程任务
description: 携程平台相关的所有任务（做题、上号等）
version: 1.0.0
author: crawler4j

# UI 扩展配置
ui_extension:
  type: declarative
  entry: config_schema.json
  nav_item:
    icon: "✈️"
    label: "携程配置"
  # 详情页自定义菜单
  detail_menu:
    - id: accounts
      icon: "👤"
      label: "账号管理"
      entry: "ui:AccountConfigPage"
    - id: stats
      icon: "📊"
      label: "运行统计"
      entry: "ui:StatsPage"

# 模块默认配置
config:
  max_retries: 3
  task_interval: [60, 180]
  similarity_threshold: 0.85

# 任务链列表（可绑定环境）
workflows:
  - name: labor_workflow
    display_name: 劳保做题
    description: 完整的劳保做题流程（登录-领题-搜索-提交）
    config:
      max_tasks: 10

  - name: login_workflow
    display_name: 携程上号
    description: 仅执行携程登录流程
