name: Build Windows release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package
        required: true
        default: main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out release source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install --global --prerelease vpk

      - name: Install locked workspace
        shell: pwsh
        run: uv sync --locked

      - name: Build Windows Velopack release
        shell: pwsh
        env:
          CRAWLER4J_VELOPACK_FEED_URL: https://updates.whzhsc.cn/win
        run: uv run package-windows-release

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: crawler4j-windows-release
          path: packages/crawler4j/dist/updates/windows/*
          if-no-files-found: error
          retention-days: 3
