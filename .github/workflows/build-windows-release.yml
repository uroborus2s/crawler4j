name: Build Windows release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package
        required: true
        default: main
      release_tag:
        description: Optional vX.Y.Z GitHub release tag
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out release source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install --global --prerelease vpk

      - name: Install locked workspace
        shell: pwsh
        run: uv sync --locked

      - name: Build Windows Velopack release
        shell: pwsh
        env:
          CRAWLER4J_VELOPACK_FEED_URL: https://updates.whzhsc.cn/win
        run: uv run package-windows-release

      - name: Publish GitHub release assets
        if: ${{ inputs.release_tag != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "release_tag must match vX.Y.Z"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --target "${{ inputs.ref }}" --title $tag --notes "Windows client release $tag"
            if ($LASTEXITCODE -ne 0) { throw "failed to create release $tag" }
          }

          $assets = Get-ChildItem packages/crawler4j/dist/updates/windows -File | ForEach-Object FullName
          gh release upload $tag @assets --clobber
          if ($LASTEXITCODE -ne 0) { throw "failed to upload release assets for $tag" }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: crawler4j-windows-release
          path: packages/crawler4j/dist/updates/windows/*
          if-no-files-found: error
          retention-days: 3
