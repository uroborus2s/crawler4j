name: Notify Docs Stratego

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Repository Dispatch to docs-stratego
        env:
          DOCS_STRATEGO_DISPATCH_TOKEN: ${{ secrets.DOCS_STRATEGO_DISPATCH_TOKEN }}
        run: |
          token="$(printf '%s' "$DOCS_STRATEGO_DISPATCH_TOKEN" | tr -d '\r\n')"
          if [ -z "$token" ]; then
            echo "DOCS_STRATEGO_DISPATCH_TOKEN is empty after trimming." >&2
            exit 1
          fi

          payload="$(printf '{"event_type":"source-pointer-sync-requested","client_payload":{"repository":"%s","branch":"%s","sha":"%s"}}' \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}")"

          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $token" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/uroborus2s/docs-stratego/dispatches \
            -d "$payload"
