[project]
name = "crawler4j-contracts"
version = "0.4.0"
description = "Crawler4j shared contracts for Core, SDK, and external modules"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["crawler4j_contracts"]
include-package-data = true

[tool.setuptools.package-dir]
crawler4j_contracts = "src"

[tool.setuptools.package-data]
crawler4j_contracts = ["py.typed"]
