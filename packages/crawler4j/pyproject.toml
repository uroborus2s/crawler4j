[project]
name = "crawler4j"
version = "0.4.22"
description = "Crawler4j desktop host app and Core runtime for module-based automation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "crawler4j-contracts>=0.4.2,<0.5.0",
    "pandas>=2.3.3",
    "playwright>=1.57.0",
    "pyqt6>=6.10.1",
    "requests>=2.32.5",
    "sinanz>=0.0.1.dev0",
    "qasync>=0.28.0",
    "httpx>=0.28.1",
    "aiohttp>=3.13.2",
    "watchdog>=4.0.0",
    "sqlalchemy>=2.0.45",
    "pydantic>=2.12.5",
    "alembic>=1.17.2",
    "apscheduler>=3.11.2",
    "pyyaml>=6.0.3",
    "debugpy>=1.8.17",
    "velopack ; sys_platform == 'win32'",
    "pyobjc-core>=11.1 ; sys_platform == 'darwin'",
    "pyobjc-framework-cocoa>=11.1 ; sys_platform == 'darwin'",
    "pyqt6-qscintilla>=2.14.1",
]

[project.scripts]
start = "src.ui.app:main"

[dependency-groups]
dev = [
    "pyinstaller>=6.17.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-qt>=4.5.0",
    "ruff>=0.14.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 120
extend-exclude = [
    "tests/analyze_*.py",
    "tests/debug_*.py",
    "tests/manual_*.py",
    "tests/verify_*.py",
]

[tool.ruff.lint]
ignore = ["RUF001", "RUF002", "RUF003"]  # Ignore ambiguous unicode characters (Chinese)
