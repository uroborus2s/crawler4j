[project]
name = "crawler4j-sdk"
version = "0.3.0"
description = "Crawler4j module SDK and CLI for building standard crawler4j modules"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "crawler4j-contracts>=0.2.0,<0.3.0",
    "aiohttp>=3.13.0",
    "pyyaml>=6.0.3",
]

[project.scripts]
crawler4j = "crawler4j_sdk.cli.commands:main"

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["crawler4j_sdk", "crawler4j_sdk.cli"]
include-package-data = true

[tool.setuptools.package-dir]
crawler4j_sdk = "src"
"crawler4j_sdk.cli" = "src/cli"

[tool.setuptools.package-data]
crawler4j_sdk = ["py.typed"]
